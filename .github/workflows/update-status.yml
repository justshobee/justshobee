name: Update Status
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Logic
        run: |
          HOUR=$(date +%H)
          if [ $HOUR -ge 23 ] || [ $HOUR -lt 7 ]; then
            MSG="System in low-power mode. Recharging consciousness."
          else
            MSG="Active session. Manipulating the grid."
          fi
          sed -i "/<!-- STATUS START -->/,/<!-- STATUS END -->/c\\ <!-- STATUS START -->\n> \`$MSG\`\n<!-- STATUS END -->" README.md

      - name: Push
        run: |
          git config user.name "robot"
          git config user.email "bot@github.com"
          git add README.md
          git diff --cached --exit-code || (git commit -m "Update status" && git push)