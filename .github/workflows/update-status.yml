name: Update Status
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Logic
        run: |
          # Use %-H to remove the leading zero (ensures 8 AM is "8" not "08")
          HOUR=$(TZ='Africa/Casablanca' date +%-H)
          
          if [ "$HOUR" -ge 23 ] || [ "$HOUR" -lt 7 ]; then
            MSG="System in low-power mode. Recharging consciousness."
          else
            MSG="Active session. Manipulating the grid."
          fi
          
          # Added -0777 to allow Perl to match across multiple lines
          perl -0777 -i -pe "s/(<!-- STATUS START -->).*?(<!-- STATUS END -->)/\$1\n> \`$MSG\`\n\$2/sg" README.md

      - name: Push
        run: |
          git config user.name "robot"
          git config user.email "bot@github.com"
          git add README.md
          # Only commit and push if the file actually changed
          git diff --cached --exit-code || (git commit -m "Update status" && git push)